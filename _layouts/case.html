<!doctype html>
<html lang="en">
  <head>
    <script
      id="Cookiebot"
      src="https://consent.cookiebot.com/uc.js"
      data-cbid="d8d8cb40-e8e6-4ca0-852d-bfb6cd1aac42"
      data-blockingmode="auto"
      type="text/javascript"
    ></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title | default: 'Case study' }} &mdash; Frederic Labadie</title>
    <meta
      name="description"
      content="{{ page.description | default: 'Analytics case study by Frederic Labadie.' | escape }}"
    />
    <meta name="theme-color" content="#eef2f5" />
    <meta name="robots" content="noindex, nofollow" />

    <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml" />
    <link rel="alternate icon" href="{{ '/favicon.svg' | relative_url }}" />
    <link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}" />

    <meta property="og:type" content="article" />
    <meta
      property="og:title"
      content="{{ page.og_title | default: page.title | default: 'Case study' | escape }}"
    />
    <meta
      property="og:description"
      content="{{ page.og_description | default: page.description | default: 'Analytics case study by Frederic Labadie.' | escape }}"
    />
    <meta
      property="og:url"
      content="{{ page.og_url | default: page.url | absolute_url }}"
    />
    <meta
      property="og:image"
      content="{{ '/assets/og/og-image.png' | absolute_url }}"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="{{ page.twitter_title | default: page.og_title | default: page.title | default: 'Case study' | escape }}"
    />
    <meta
      name="twitter:description"
      content="{{ page.twitter_description | default: page.og_description | default: page.description | default: 'Analytics case study by Frederic Labadie.' | escape }}"
    />
    <meta
      name="twitter:image"
      content="{{ '/assets/og/og-image.png' | absolute_url }}"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}" />
    <link rel="stylesheet" href="{{ '/css/case-blueprint.css' | relative_url }}" />
  </head>
  <body class="bp-case-body">
    <a class="skip-link" href="#case">Skip to case</a>
    {% include site-nav.html %}

    <main class="bp-case-shell" id="top">
      {{ content }}
    </main>

    {% include site-footer.html %}
    {% include site-scripts.html %}
  </body>
</html>
