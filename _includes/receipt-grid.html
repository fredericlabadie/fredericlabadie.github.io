<section class="{{ include.class | default: 'bp-receipts' }}"{% if include.aria_label %} aria-label="{{ include.aria_label }}"{% endif %}>
  {% for receipt in include.receipts %}
    <article class="{{ include.item_class | default: 'bp-receipt' }}">
      {% if receipt.kicker %}<p>{{ receipt.kicker }}</p>{% endif %}
      <strong>{{ receipt.value }}</strong>
      <span>{{ receipt.label }}</span>
    </article>
  {% endfor %}
</section>
